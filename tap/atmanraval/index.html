<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proviq Card | Atman Raval</title>
    <meta name="description" content="Digital business card for Atman Raval at Proviq. Save contact details, share instantly, or scan the QR code.">
    <meta name="robots" content="noindex, nofollow">
    <meta property="og:title" content="Atman Raval | Proviq">
    <meta property="og:description" content="Save Atman Raval's contact details, connect on LinkedIn, or share this digital card instantly.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://proviq.co/tap/atmanraval/">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <style>
        body.tap-page {
            min-height: 100vh;
        }

        body.tap-page::after {
            background-image:
                radial-gradient(circle at 10% 12%, rgba(0, 168, 150, 0.24), transparent 36%),
                radial-gradient(circle at 88% 14%, rgba(242, 106, 75, 0.2), transparent 40%),
                radial-gradient(circle at 82% 88%, rgba(244, 183, 95, 0.22), transparent 36%),
                radial-gradient(circle at 18% 82%, rgba(16, 24, 41, 0.08), transparent 30%);
            opacity: 0.98;
        }

        .tap-shell {
            min-height: 100vh;
            padding: 28px 0;
            display: flex;
            align-items: center;
        }

        .tap-frame {
            width: min(100%, 620px);
            margin: 0 auto;
            position: relative;
        }

        .tap-frame::before,
        .tap-frame::after {
            content: "";
            position: absolute;
            border-radius: 999px;
            filter: blur(10px);
            z-index: 0;
        }

        .tap-frame::before {
            width: 200px;
            height: 200px;
            top: -28px;
            right: -40px;
            background: rgba(0, 168, 150, 0.18);
        }

        .tap-frame::after {
            width: 160px;
            height: 160px;
            bottom: 96px;
            left: -26px;
            background: rgba(242, 106, 75, 0.16);
        }

        .tap-card {
            position: relative;
            z-index: 1;
            display: grid;
            gap: 1.15rem;
            padding: 28px;
            border-radius: 32px;
            background:
                linear-gradient(150deg, rgba(255, 255, 255, 0.95), rgba(255, 255, 255, 0.82)),
                rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(11, 18, 32, 0.1);
            box-shadow: 0 30px 70px rgba(11, 18, 32, 0.16);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            overflow: hidden;
        }

        .tap-card::before {
            content: "";
            position: absolute;
            inset: 0 auto auto 0;
            width: 100%;
            height: 6px;
            background: var(--gradient-accent);
        }

        .tap-brand {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .tap-logo {
            font-family: var(--font-display);
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: -0.03em;
        }

        .tap-logo span {
            color: var(--teal);
        }

        .tap-hero {
            display: grid;
            gap: 1rem;
            padding: 1.4rem;
            border-radius: 26px;
            background: linear-gradient(165deg, rgba(255, 244, 228, 0.92), rgba(238, 249, 247, 0.96));
            border: 1px solid rgba(11, 18, 32, 0.08);
        }

        .tap-hero-head {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 156px;
            gap: 1.25rem;
            align-items: end;
        }

        .tap-hero-copy {
            display: grid;
            gap: 0.85rem;
            align-self: center;
        }

        .tap-avatar {
            width: 156px;
            height: 156px;
            justify-self: end;
            border-radius: 34px;
            overflow: hidden;
            border: 3px solid rgba(255, 255, 255, 0.92);
            box-shadow: 0 20px 36px rgba(11, 18, 32, 0.14);
            background: rgba(255, 255, 255, 0.9);
        }

        .tap-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
        }

        .tap-kicker {
            font-size: 0.76rem;
            letter-spacing: 0.24em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .tap-name {
            font-family: var(--font-display);
            font-size: clamp(2.35rem, 8vw, 3.3rem);
            line-height: 0.95;
            letter-spacing: -0.05em;
        }

        .tap-role {
            font-size: 1rem;
            font-weight: 600;
            color: var(--accent);
        }

        .tap-meta-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 0.85rem;
        }

        .tap-meta {
            padding: 0.9rem 1rem;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.78);
            border: 1px solid rgba(11, 18, 32, 0.08);
        }

        .tap-meta-link {
            display: block;
            transition: transform 0.24s ease, box-shadow 0.24s ease, border-color 0.24s ease;
        }

        .tap-meta-link:hover,
        .tap-meta-link:focus-visible {
            transform: translateY(-2px);
            box-shadow: 0 16px 30px rgba(11, 18, 32, 0.1);
            border-color: rgba(0, 168, 150, 0.28);
        }

        .tap-meta-label {
            display: block;
            margin-bottom: 0.2rem;
            color: var(--muted);
            font-size: 0.75rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }

        .tap-meta-value,
        .tap-meta-value a {
            color: var(--ink);
            font-weight: 600;
            word-break: break-word;
        }

        .tap-cta-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 0.85rem;
        }

        .tap-primary {
            border-radius: 20px;
            border: 1px solid rgba(11, 18, 32, 0.08);
            transition: transform 0.24s ease, box-shadow 0.24s ease, border-color 0.24s ease;
        }

        .tap-primary {
            min-height: 72px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            padding: 1rem 1.1rem;
        }

        .tap-primary {
            background: var(--gradient-accent);
            color: #fff;
            box-shadow: 0 18px 36px rgba(11, 18, 32, 0.14);
        }

        .tap-primary:hover,
        .tap-primary:focus-visible {
            transform: translateY(-2px);
            box-shadow: 0 18px 38px rgba(11, 18, 32, 0.12);
            border-color: rgba(0, 168, 150, 0.28);
        }

        .tap-button-copy {
            display: grid;
            gap: 0.18rem;
            text-align: left;
        }

        .tap-button-title {
            font-weight: 700;
            font-size: 1rem;
        }

        .tap-button-meta {
            font-size: 0.92rem;
            opacity: 0.9;
        }

        .tap-button-badge {
            flex-shrink: 0;
            padding: 0.46rem 0.72rem;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.18);
            border: 1px solid rgba(255, 255, 255, 0.22);
            font-size: 0.74rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .tap-qr-panel {
            display: grid;
            justify-items: center;
            width: 100%;
            padding: 1.35rem;
            border-radius: 24px;
            border: 1px solid rgba(11, 18, 32, 0.08);
            background: rgba(255, 255, 255, 0.82);
            box-shadow: 0 12px 28px rgba(11, 18, 32, 0.08);
            cursor: pointer;
            font: inherit;
            transition: transform 0.24s ease, box-shadow 0.24s ease, border-color 0.24s ease;
        }

        .tap-qr-panel:hover,
        .tap-qr-panel:focus-visible {
            transform: translateY(-2px);
            box-shadow: 0 18px 38px rgba(11, 18, 32, 0.12);
            border-color: rgba(0, 168, 150, 0.28);
        }

        .tap-qr-panel-image {
            width: min(100%, 300px);
            border-radius: 24px;
            background: #fff;
            padding: 14px;
            border: 1px solid rgba(11, 18, 32, 0.08);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.6);
        }

        .tap-qr-panel-image img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 16px;
        }

        .tap-save-note {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            min-height: 72px;
            width: 100%;
            padding: 1rem 1.1rem;
            border-radius: 20px;
            background: rgba(16, 24, 41, 0.92);
            color: #fff;
            border: 1px solid rgba(16, 24, 41, 0.12);
            box-shadow: 0 18px 36px rgba(11, 18, 32, 0.14);
            cursor: pointer;
            font: inherit;
            text-align: left;
            transition: transform 0.24s ease, box-shadow 0.24s ease, border-color 0.24s ease, background 0.24s ease;
        }

        .tap-save-note:hover,
        .tap-save-note:focus-visible {
            transform: translateY(-2px);
            box-shadow: 0 18px 38px rgba(11, 18, 32, 0.12);
            border-color: rgba(0, 168, 150, 0.28);
            background: rgba(16, 24, 41, 0.96);
        }

        .tap-save-copy {
            display: grid;
            gap: 0.2rem;
        }

        .tap-save-title {
            font-weight: 700;
            font-size: 1rem;
            line-height: 1.2;
        }

        .tap-save-text {
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.92rem;
            opacity: 0.9;
        }

        .tap-save-badge {
            flex-shrink: 0;
            padding: 0.46rem 0.72rem;
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.18);
            color: #fff;
            font-size: 0.74rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .tap-modal {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: rgba(11, 18, 32, 0.56);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.24s ease;
            z-index: 1200;
        }

        .tap-modal.is-open {
            opacity: 1;
            pointer-events: auto;
        }

        .tap-modal-card {
            width: min(100%, 520px);
            padding: 56px 24px 24px;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.96);
            border: 1px solid rgba(11, 18, 32, 0.08);
            box-shadow: 0 30px 80px rgba(11, 18, 32, 0.22);
            text-align: center;
            position: relative;
        }

        .tap-qr-modal-card {
            width: min(100%, 420px);
            padding: 56px 18px 18px;
            opacity: 0;
            pointer-events: none;
            transform: scale(0.94) translateY(8px);
            transition: opacity 0.2s ease, transform 0.24s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .tap-qr-modal-card.is-visible {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1) translateY(0);
        }

        .tap-modal-close {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 40px;
            height: 40px;
            border: 1px solid rgba(11, 18, 32, 0.08);
            border-radius: 999px;
            background: rgba(16, 24, 41, 0.04);
            color: var(--ink);
            font: inherit;
            cursor: pointer;
        }

        .tap-modal-name {
            font-family: var(--font-display);
            font-size: clamp(2rem, 7vw, 2.9rem);
            line-height: 0.95;
            letter-spacing: -0.04em;
            margin-top: 0.4rem;
        }

        .tap-modal-company {
            margin-top: 0.45rem;
            color: var(--muted);
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.18em;
        }

        .tap-modal-qr {
            width: min(100%, 100%);
            margin: 0 auto;
            padding: 14px;
            border-radius: 24px;
            background: #fff;
            border: 1px solid rgba(11, 18, 32, 0.08);
            box-shadow: 0 18px 40px rgba(11, 18, 32, 0.1);
        }

        .tap-modal-qr img {
            width: 100%;
            height: auto;
            border-radius: 16px;
        }

        .tap-modal-url {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            max-width: 100%;
            padding: 0.58rem 0.85rem;
            border-radius: 999px;
            background: rgba(16, 24, 41, 0.05);
            color: var(--accent);
            font-size: 0.84rem;
            overflow-wrap: anywhere;
        }

        .tap-modal-lead {
            margin-top: 0.9rem;
            color: var(--muted);
            font-size: 0.96rem;
        }

        .tap-modal-steps {
            margin: 1rem auto 0;
            max-width: 320px;
            display: grid;
            gap: 0.7rem;
            text-align: left;
        }

        .tap-modal-step {
            padding: 0.85rem 0.95rem;
            border-radius: 16px;
            background: rgba(16, 24, 41, 0.04);
            color: var(--ink);
            font-size: 0.93rem;
            line-height: 1.45;
        }

        .tap-modal-actions {
            margin-top: 1rem;
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .tap-modal-button {
            min-height: 46px;
            padding: 0.8rem 1rem;
            border-radius: 14px;
            border: 1px solid rgba(11, 18, 32, 0.08);
            background: rgba(16, 24, 41, 0.05);
            color: var(--ink);
            font: inherit;
            font-weight: 600;
            cursor: pointer;
        }

        @media (max-width: 700px) {
            .tap-card {
                padding: 22px;
                border-radius: 28px;
            }

            .tap-meta-grid,
            .tap-cta-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 520px) {
            .tap-shell {
                padding: 16px 0;
            }

            .tap-brand {
                flex-direction: column;
                align-items: flex-start;
            }

            .tap-primary,
            .tap-save-note {
                align-items: flex-start;
                flex-direction: column;
            }

            .tap-button-badge,
            .tap-save-badge {
                align-self: flex-start;
            }

            .tap-hero-head {
                grid-template-columns: 1fr;
            }

            .tap-hero-copy {
                order: 2;
            }

            .tap-avatar {
                order: 1;
                width: 132px;
                height: 132px;
                justify-self: start;
            }

            .tap-qr-panel-image {
                width: min(100%, 220px);
            }
        }
    </style>
</head>

    <script>
        (function () {
            var cardUrl = "https://proviq.co/tap/atmanraval/";
            var prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
            var qrPanelButton = document.getElementById("qrPanelButton");
            var qrModal = document.getElementById("qrModal");
            var qrModalCard = document.getElementById("qrModalCard");
            var qrModalClose = document.getElementById("qrModalClose");
            var bookmarkButton = document.getElementById("bookmarkCardButton");
            var bookmarkModal = document.getElementById("bookmarkModal");
            var bookmarkModalClose = document.getElementById("bookmarkModalClose");
            var bookmarkModalLead = document.getElementById("bookmarkModalLead");
            var bookmarkSteps = document.getElementById("bookmarkSteps");
            var copyCardLinkButton = document.getElementById("copyCardLinkButton");

            function setBodyLock(locked) {
                document.body.style.overflow = locked ? "hidden" : "";
            }

            function openQrModal() {
                qrModal.classList.add("is-open");
                qrModal.setAttribute("aria-hidden", "false");
                setBodyLock(true);
                requestAnimationFrame(function () {
                    qrModalCard.classList.add("is-visible");
                });
            }

            function closeQrModal() {
                qrModalCard.classList.remove("is-visible");
                window.setTimeout(function () {
                    qrModal.classList.remove("is-open");
                    qrModal.setAttribute("aria-hidden", "true");
                    setBodyLock(false);
                }, prefersReducedMotion ? 0 : 220);
            }

            function getBookmarkInstructions() {
                var ua = navigator.userAgent || "";
                var isIPhone = /iPhone|iPad|iPod/i.test(ua);
                var isAndroid = /Android/i.test(ua);

                if (isIPhone) {
                    return {
                        lead: "Safari does not let websites add bookmarks automatically.",
                        steps: [
                            "Tap the Share icon in Safari.",
                            "Choose Add Bookmark or Add to Home Screen.",
                            "Save this card so you can open it later."
                        ]
                    };
                }

                if (isAndroid) {
                    return {
                        lead: "Android browsers usually require a manual bookmark step.",
                        steps: [
                            "Tap the browser menu.",
                            "Choose Star, Bookmark, or Add to Home screen.",
                            "Save this card so you can reopen it later."
                        ]
                    };
                }

                return {
                    lead: "Most browsers require you to confirm bookmarks yourself.",
                    steps: [
                        "Open the browser menu or bookmark icon.",
                        "Choose Bookmark or Add to favorites.",
                        "Save this card to reopen it later."
                    ]
                };
            }

            function renderBookmarkInstructions() {
                var instructions = getBookmarkInstructions();
                bookmarkModalLead.textContent = instructions.lead;
                bookmarkSteps.innerHTML = instructions.steps.map(function (step) {
                    return '<div class="tap-modal-step">' + step + "</div>";
                }).join("");
            }

            function openBookmarkModal() {
                renderBookmarkInstructions();
                bookmarkModal.classList.add("is-open");
                bookmarkModal.setAttribute("aria-hidden", "false");
                setBodyLock(true);
            }

            function closeBookmarkModal() {
                bookmarkModal.classList.remove("is-open");
                bookmarkModal.setAttribute("aria-hidden", "true");
                setBodyLock(false);
            }

            function legacyCopyLink() {
                var textarea = document.createElement("textarea");
                textarea.value = cardUrl;
                textarea.setAttribute("readonly", "");
                textarea.style.position = "absolute";
                textarea.style.left = "-9999px";
                document.body.appendChild(textarea);
                textarea.select();
                textarea.setSelectionRange(0, textarea.value.length);

                try {
                    document.execCommand("copy");
                } catch (error) {
                    return;
                } finally {
                    document.body.removeChild(textarea);
                }
            }

            function copyLink() {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(cardUrl).catch(function () {
                        legacyCopyLink();
                    });
                    return;
                }

                legacyCopyLink();
            }

            function tryNativeBookmark() {
                try {
                    if (window.sidebar && window.sidebar.addPanel) {
                        window.sidebar.addPanel(document.title, cardUrl, "");
                        return true;
                    }
                } catch (error) {}

                try {
                    if (window.external && typeof window.external.AddFavorite === "function") {
                        window.external.AddFavorite(cardUrl, document.title);
                        return true;
                    }
                } catch (error) {}

                return false;
            }

            function handleBookmark() {
                if (!tryNativeBookmark()) {
                    openBookmarkModal();
                }
            }

            qrPanelButton.addEventListener("click", openQrModal);
            qrModalClose.addEventListener("click", closeQrModal);
            qrModal.addEventListener("click", function (event) {
                if (event.target === qrModal) {
                    closeQrModal();
                }
            });
            bookmarkButton.addEventListener("click", handleBookmark);
            bookmarkModalClose.addEventListener("click", closeBookmarkModal);
            bookmarkModal.addEventListener("click", function (event) {
                if (event.target === bookmarkModal) {
                    closeBookmarkModal();
                }
            });
            copyCardLinkButton.addEventListener("click", copyLink);
            document.addEventListener("keydown", function (event) {
                if (event.key === "Escape" && qrModal.classList.contains("is-open")) {
                    closeQrModal();
                }
                if (event.key === "Escape" && bookmarkModal.classList.contains("is-open")) {
                    closeBookmarkModal();
                }
            });
        }());
    </script>
</body>
</html>
